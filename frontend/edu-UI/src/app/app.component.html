<ng-container *ngIf="isLoggedIn$ | async; else publicView">
    <!-- Skip to main content link for accessibility -->
    <a class="skip-link" href="#main-content">Skip to main content</a>
    
    <div class="app-layout">
        <!-- Sidebar navigation -->
        <aside class="app-sidenav" role="navigation" aria-label="Main navigation">
            <app-side-nav></app-side-nav>
        </aside>

        <!-- Main application area -->
        <div class="app-main">
            <header class="app-topbar" role="banner">
                <app-navbar-main></app-navbar-main>
            </header>

            <main id="main-content" class="app-content" role="main">
                <router-outlet></router-outlet>
            </main>
        </div>

        <!-- Global loader -->
        <app-loader aria-live="polite" aria-busy="true"></app-loader>
    </div>
</ng-container>

<ng-template #publicView>
    <div class="public-layout">
        <main role="main">
            <router-outlet></router-outlet>
        </main>
        <app-loader aria-live="polite"></app-loader>
    </div>
</ng-template>
