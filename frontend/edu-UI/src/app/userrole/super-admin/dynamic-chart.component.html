<div class="dynamic-chart" [ngClass]="[type, isInitialized ? 'initialized' : '']">
  <ng-container [ngSwitch]="type">
    
    <!-- ═══════════════════════════════════════════════════════════════════
         BAR CHART - Modern gradient bars with hover effects
    ═══════════════════════════════════════════════════════════════════ -->
    <div *ngSwitchCase="'bar'" class="chart-wrap bar-wrap">
      <svg viewBox="0 0 240 130" preserveAspectRatio="xMidYMid meet" class="chart-svg bar-svg">
        <!-- Gradient Definitions -->
        <defs>
          <ng-container *ngFor="let r of barRects; let i = index">
            <linearGradient [attr.id]="'barGrad' + i" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" [attr.stop-color]="colors[i % colors.length].start" />
              <stop offset="100%" [attr.stop-color]="colors[i % colors.length].end" />
            </linearGradient>
          </ng-container>
          <filter id="barShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.15"/>
          </filter>
        </defs>
        
        <!-- Grid lines -->
        <g class="grid-lines">
          <line x1="20" y1="20" x2="220" y2="20" stroke="#e2e8f0" stroke-dasharray="4,4" />
          <line x1="20" y1="50" x2="220" y2="50" stroke="#e2e8f0" stroke-dasharray="4,4" />
          <line x1="20" y1="80" x2="220" y2="80" stroke="#e2e8f0" stroke-dasharray="4,4" />
          <line x1="20" y1="110" x2="220" y2="110" stroke="#e2e8f0" />
        </g>
        
        <!-- Bars -->
        <g class="bars">
          <ng-container *ngFor="let r of barRects; let i = index; trackBy: trackByIndex">
            <g class="bar-group" 
               [class.hovered]="hoveredIndex === i"
               (mouseenter)="onBarHover(i, r, $event)"
               (mouseleave)="onBarLeave()">
              <rect 
                [attr.x]="25 + i * 50" 
                [attr.y]="110 - r.height" 
                [attr.width]="36" 
                [attr.height]="r.height"
                rx="4" 
                ry="4"
                [attr.fill]="'url(#barGrad' + i + ')'"
                class="bar-rect"
                [style.--delay]="i * 0.1 + 's'"
              />
              <!-- Value label -->
              <text 
                [attr.x]="43 + i * 50" 
                [attr.y]="105 - r.height" 
                text-anchor="middle" 
                class="bar-value"
                [class.visible]="hoveredIndex === i || !showTooltip">
                {{ r.value }}
              </text>
            </g>
          </ng-container>
        </g>
      </svg>
      
      <!-- Legend -->
      <div class="chart-legend">
        <div class="legend-item" *ngFor="let r of barRects; let i = index"
             [class.active]="hoveredIndex === i"
             (mouseenter)="hoveredIndex = i"
             (mouseleave)="hoveredIndex = -1">
          <span class="legend-dot" [style.background]="'linear-gradient(135deg, ' + colors[i % colors.length].start + ', ' + colors[i % colors.length].end + ')'"></span>
          <span class="legend-label">{{r.label}}</span>
          <span class="legend-value">{{r.value}}</span>
        </div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════════════════
         PIE/DONUT CHART - Modern donut with center metric
    ═══════════════════════════════════════════════════════════════════ -->
    <div *ngSwitchCase="'pie'" class="chart-wrap pie-wrap">
      <div class="donut-container">
        <svg viewBox="0 0 100 100" class="chart-svg donut-svg">
          <defs>
            <ng-container *ngFor="let s of donutSlices; let i = index">
              <linearGradient [attr.id]="'pieGrad' + i" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" [attr.stop-color]="colors[i % colors.length].start" />
                <stop offset="100%" [attr.stop-color]="colors[i % colors.length].end" />
              </linearGradient>
            </ng-container>
            <filter id="pieShadow">
              <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.2"/>
            </filter>
          </defs>
          
          <!-- Background circle -->
          <circle cx="50" cy="50" r="35" fill="#f8fafc" />
          
          <!-- Donut slices -->
          <g class="slices">
            <path 
              *ngFor="let s of donutSlices; let i = index; trackBy: trackByIndex"
              [attr.d]="s.path"
              [attr.fill]="'url(#pieGrad' + i + ')'"
              class="donut-slice"
              [class.hovered]="hoveredIndex === i"
              [style.--delay]="i * 0.1 + 's'"
              (mouseenter)="onSliceHover(i, s)"
              (mouseleave)="onSliceLeave()"
            />
          </g>
          
          <!-- Inner circle (donut hole) -->
          <circle cx="50" cy="50" r="22" fill="white" class="donut-hole" />
          
          <!-- Center text -->
          <text x="50" y="48" text-anchor="middle" class="donut-total-value">
            {{ pieSlices.length }}
          </text>
          <text x="50" y="58" text-anchor="middle" class="donut-total-label">
            Items
          </text>
        </svg>
        
        <!-- Hover tooltip -->
        <div class="donut-tooltip" *ngIf="hoveredIndex >= 0 && donutSlices[hoveredIndex]">
          <span class="tooltip-label">{{ donutSlices[hoveredIndex].label }}</span>
          <span class="tooltip-value">{{ donutSlices[hoveredIndex].value }} ({{ donutSlices[hoveredIndex].pct }}%)</span>
        </div>
      </div>
      
      <!-- Legend -->
      <div class="chart-legend pie-legend">
        <div class="legend-item" *ngFor="let s of donutSlices; let i = index"
             [class.active]="hoveredIndex === i"
             (mouseenter)="hoveredIndex = i"
             (mouseleave)="hoveredIndex = -1">
          <span class="legend-dot" [style.background]="'linear-gradient(135deg, ' + colors[i % colors.length].start + ', ' + colors[i % colors.length].end + ')'"></span>
          <span class="legend-label">{{s.label}}</span>
          <span class="legend-value">{{s.value}}</span>
          <span class="legend-pct">{{s.pct}}%</span>
        </div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════════════════
         LINE/AREA CHART - Smooth curves with gradient fill
    ═══════════════════════════════════════════════════════════════════ -->
    <div *ngSwitchCase="'line'" class="chart-wrap line-wrap">
      <svg viewBox="0 0 220 80" preserveAspectRatio="xMidYMid meet" class="chart-svg line-svg">
        <defs>
          <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#667eea" />
            <stop offset="100%" stop-color="#764ba2" />
          </linearGradient>
          <linearGradient id="areaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#667eea" stop-opacity="0.3" />
            <stop offset="100%" stop-color="#667eea" stop-opacity="0.02" />
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
        
        <!-- Grid -->
        <g class="grid-lines">
          <line x1="10" y1="15" x2="210" y2="15" stroke="#e2e8f0" stroke-dasharray="3,3" opacity="0.5" />
          <line x1="10" y1="35" x2="210" y2="35" stroke="#e2e8f0" stroke-dasharray="3,3" opacity="0.5" />
          <line x1="10" y1="55" x2="210" y2="55" stroke="#e2e8f0" stroke-dasharray="3,3" opacity="0.5" />
        </g>
        
        <!-- Area fill -->
        <path [attr.d]="areaPath" fill="url(#areaGrad)" class="area-fill" />
        
        <!-- Line -->
        <path 
          [attr.d]="smoothLinePath" 
          fill="none" 
          stroke="url(#lineGrad)" 
          stroke-width="2.5" 
          stroke-linecap="round" 
          stroke-linejoin="round"
          class="line-path"
          filter="url(#glow)"
        />
        
        <!-- Data points -->
        <g class="data-points">
          <ng-container *ngFor="let p of attemptPoints; let i = index; trackBy: trackByIndex">
            <g class="point-group"
               [class.hovered]="hoveredIndex === i"
               (mouseenter)="onPointHover(i, p)"
               (mouseleave)="onPointLeave()">
              <!-- Outer glow ring -->
              <circle 
                [attr.cx]="p.cx + 10" 
                [attr.cy]="p.cy" 
                r="8" 
                fill="#667eea" 
                opacity="0.15"
                class="point-glow"
              />
              <!-- Point -->
              <circle 
                [attr.cx]="p.cx + 10" 
                [attr.cy]="p.cy" 
                r="4" 
                fill="white" 
                stroke="#667eea" 
                stroke-width="2"
                class="point-dot"
              />
              <!-- Value label on hover -->
              <text 
                [attr.x]="p.cx + 10" 
                [attr.y]="p.cy - 10" 
                text-anchor="middle" 
                class="point-value"
                [class.visible]="hoveredIndex === i">
                {{p.v}}
              </text>
            </g>
          </ng-container>
        </g>
      </svg>
    </div>

    <!-- ═══════════════════════════════════════════════════════════════════
         GAUGE CHART - Modern radial gauge with gradient
    ═══════════════════════════════════════════════════════════════════ -->
    <div *ngSwitchCase="'gauge'" class="chart-wrap gauge-wrap">
      <svg viewBox="0 0 100 70" class="chart-svg gauge-svg">
        <defs>
          <linearGradient id="gaugeGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" [attr.stop-color]="gaugeColor" stop-opacity="0.6" />
            <stop offset="100%" [attr.stop-color]="gaugeColor" />
          </linearGradient>
          <filter id="gaugeShadow">
            <feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.2"/>
          </filter>
        </defs>
        
        <!-- Background arc -->
        <path 
          [attr.d]="gaugeBackgroundPath" 
          fill="none" 
          stroke="#e2e8f0" 
          stroke-width="8"
          stroke-linecap="round"
        />
        
        <!-- Progress arc -->
        <path 
          [attr.d]="gaugeArcPath" 
          fill="none" 
          stroke="url(#gaugeGrad)" 
          stroke-width="8"
          stroke-linecap="round"
          class="gauge-progress"
          filter="url(#gaugeShadow)"
        />
        
        <!-- Tick marks -->
        <g class="gauge-ticks">
          <line x1="14" y1="58" x2="18" y2="54" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" />
          <line x1="50" y1="10" x2="50" y2="16" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" />
          <line x1="86" y1="58" x2="82" y2="54" stroke="#cbd5e1" stroke-width="1.5" stroke-linecap="round" />
        </g>
        
        <!-- Labels -->
        <text x="10" y="68" class="gauge-label">0</text>
        <text x="50" y="4" text-anchor="middle" class="gauge-label">50</text>
        <text x="90" y="68" text-anchor="end" class="gauge-label">100</text>
      </svg>
      
      <!-- Center metric -->
      <div class="gauge-metric">
        <div class="metric-value" [style.color]="gaugeColor">{{metricValue}}<span class="metric-unit">%</span></div>
        <div class="metric-label">Score</div>
      </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════════════════
         DEFAULT / EMPTY STATE
    ═══════════════════════════════════════════════════════════════════ -->
    <div *ngSwitchDefault class="chart-wrap empty-wrap">
      <div class="empty-chart">
        <svg viewBox="0 0 64 64" class="empty-icon">
          <circle cx="32" cy="32" r="28" fill="#f1f5f9" />
          <path d="M20 40 L28 28 L36 35 L44 22" stroke="#cbd5e1" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none" />
          <circle cx="20" cy="40" r="3" fill="#94a3b8" />
          <circle cx="28" cy="28" r="3" fill="#94a3b8" />
          <circle cx="36" cy="35" r="3" fill="#94a3b8" />
          <circle cx="44" cy="22" r="3" fill="#94a3b8" />
        </svg>
        <span class="empty-text">No data available</span>
      </div>
    </div>
  </ng-container>
</div>
