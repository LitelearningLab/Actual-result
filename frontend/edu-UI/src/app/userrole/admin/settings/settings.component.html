<section class="settings-page">
  <mat-card>
    <mat-card-header>
      <mat-icon mat-card-avatar>psychology</mat-icon>
      <mat-card-title>AI evaluation</mat-card-title>
      <mat-card-subtitle>Flag descriptive answers whose AI confidence is below this value.</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <mat-form-field appearance="outline">
        <mat-label>AI Confidence Threshold</mat-label>
        <input matInput type="number" min="0" max="100" step="0.1" [formControl]="threshold">
        <span matSuffix>%</span>
        <mat-error *ngIf="threshold.hasError('required')">A threshold is required.</mat-error>
        <mat-error *ngIf="threshold.hasError('min') || threshold.hasError('max')">Enter a value from 0 to 100.</mat-error>
      </mat-form-field>
    </mat-card-content>
    <mat-card-actions align="end">
      <button mat-flat-button color="primary" type="button" (click)="save()" [disabled]="loading || saving || threshold.invalid">
        <mat-icon>save</mat-icon> {{ saving ? 'Saving...' : 'Save' }}
      </button>
    </mat-card-actions>
  </mat-card>
</section>
