<aside class="app-side-nav" [class.collapsed]="collapsed" *ngIf="isLogin" role="navigation" aria-label="Main application navigation">

    <!-- ── Branding ── -->
    <div class="side-top">
        <button class="collapse-toggle" mat-icon-button (click)="toggleCollapse()"
            [attr.aria-expanded]="!collapsed" aria-label="Toggle navigation sidebar">
            <mat-icon class="collapse-icon">{{ collapsed ? 'chevron_right' : 'chevron_left' }}</mat-icon>
        </button>

        <div class="logo-wrap" role="banner" *ngIf="!collapsed">
            <img class="institute-logo institute-logo-expanded" src="/assets/images/logo-main.png" alt="Institute logo" loading="lazy" />
        </div>
        <div class="logo-wrap" role="banner" *ngIf="collapsed">
            <img class="institute-logo institute-logo-collapsed" src="/assets/images/logo.png" alt="Institute" loading="lazy" />
        </div>
    </div>

    <!-- ── Menu Navigation ── -->
    <nav class="menu" role="menubar">
        <ng-container *ngFor="let m of menus">
            <ng-container
                *ngIf="['Users','Categories','Questions','Exams','Schedule Exam'].includes(m.label); else plainLink">
                <a *hasAccess="m.label; hasAccessAction: 'view'" 
                    [routerLink]="m.path" 
                    class="menu-item"
                    role="menuitem"
                    routerLinkActive="active" 
                    [routerLinkActiveOptions]="{exact: false}"
                    (click)="onMenuClick(m)" 
                    [ngClass]="{ 'active': selectedMenu === m.label }" 
                    [title]="m.label"
                    [attr.aria-current]="selectedMenu === m.label ? 'page' : null">
                    <span class="menu-icon-wrap" aria-hidden="true">
                        <mat-icon class="menu-icon" svgIcon="{{ m.icon }}"></mat-icon>
                    </span>
                    <span class="menu-label" *ngIf="!collapsed">{{ m.label }}</span>
                </a>
            </ng-container>
            <ng-template #plainLink>
                <a [routerLink]="m.path" 
                    class="menu-item"
                    role="menuitem"
                    routerLinkActive="active"
                    [routerLinkActiveOptions]="{exact: false}"
                    (click)="onMenuClick(m)" 
                    [ngClass]="{ 'active': selectedMenu === m.label }" 
                    [title]="m.label"
                    [attr.aria-current]="selectedMenu === m.label ? 'page' : null">
                    <span class="menu-icon-wrap" aria-hidden="true">
                        <mat-icon class="menu-icon" svgIcon="{{ m.icon || 'menu' }}"></mat-icon>
                    </span>
                    <span class="menu-label" *ngIf="!collapsed">{{ m.label }}</span>
                </a>
            </ng-template>
        </ng-container>
    </nav>

    <!-- ── Footer Information ── -->
    <footer class="side-bottom">
        <div class="app-info">
            <p class="app-version" *ngIf="!collapsed">
                <span class="version-label">V1.1.0</span>
                <span class="copyright">&copy; 2026 Profluent Labs</span>
            </p>
            <p class="app-version" *ngIf="collapsed" title="Version">V1.0</p>
        </div>
    </footer>

    <ng-content></ng-content>
</aside>
