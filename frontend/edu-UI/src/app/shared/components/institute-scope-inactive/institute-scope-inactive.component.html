<div class="inactive-page">
  <section class="inactive-panel">
    <div class="inactive-icon">
      <mat-icon>domain_disabled</mat-icon>
    </div>
    <h1>This page is inactive for your current organization.</h1>
    <p>
      You are currently viewing data for a specific organization using the Global Institute Filter.
      Clear the filter to access the Institutes page and manage all organizations.
    </p>
    <button type="button" class="clear-scope-btn" (click)="clearGlobalFilter()">
      <mat-icon>filter_alt_off</mat-icon>
      <span>Clear Global Filter</span>
    </button>
  </section>
</div>
