<div class="navbar-main" role="banner">
  <div class="navbar-inner">
    <!-- Left: Module title & breadcrumb -->
    <div class="navbar-left">
      <div class="app-title">
        <div class="title">{{ moduleName }}</div>
        <!-- <div class="subtitle" *ngIf="moduleData">{{ moduleData }}</div> -->
      </div>
    </div>

    <!-- Right: Actions & User -->
    <div class="navbar-right" *ngIf="isLogin" role="toolbar" aria-label="Top navigation actions">
      <!-- Institute Info -->
      <div class="institute-inline" role="complementary" aria-label="Institute">
        <span class="institute-inline-name" [title]="instituteDisplayName">{{ instituteDisplayName }}</span>
      </div>

      <!-- Notifications -->
      <button mat-icon-button
        aria-label="Show notifications"
        class="navbar-icon-btn notifications-btn"
        title="Notifications">
        <mat-icon fontSet="material-icons-outlined" class="navbar-icon">notifications</mat-icon>
      </button>

      <!-- User Menu -->
      <button mat-icon-button
        aria-label="Open user menu"
        class="navbar-icon-btn user-menu-btn"
        (click)="openUserPanel($event)"
        title="Menu">
        <mat-icon fontSet="material-icons-outlined" class="navbar-icon">menu</mat-icon>
      </button>
    </div>
  </div>
</div>

<div class="user-panel-backdrop" *ngIf="isUserPanelOpen" (click)="closeUserPanel()"></div>
<aside class="user-side-panel" [class.open]="isUserPanelOpen" role="dialog" aria-modal="true" aria-label="User menu">
  <div class="user-panel-header">
    <div class="user-panel-identity">
      <div class="profile-logo-inline profile-logo-inline--panel" [title]="displayName" aria-label="Profile logo">{{ initials }}</div>
      <div class="user-panel-title-block">
        <span class="user-panel-eyebrow">Welcome</span>
        <h2>{{ displayName }}</h2>
      </div>
    </div>
  </div>
  <nav class="user-panel-menu" aria-label="User menu options">
    <button type="button" class="user-panel-item" (click)="openSettings()">
      <mat-icon fontSet="material-icons-outlined">settings</mat-icon>
      <span>Settings</span>
    </button>
    <button type="button" class="user-panel-item" (click)="confirmLogout()">
      <mat-icon fontSet="material-icons-outlined">logout</mat-icon>
      <span>Logout</span>
    </button>
  </nav>
  <div class="user-panel-footer">
    <span>v1.1.3</span>
    <span>&copy; 2026 Profluent Labs</span>
  </div>
</aside>
<!-- Logout confirmation dialog template -->
<ng-template #logoutConfirmationDialog>
  <div class="logout-modal-wrap" role="dialog" aria-modal="true" aria-labelledby="logoutTitle">
    <div class="logout-card" tabindex="-1">
      <header class="logout-header">
        <div class="logout-graphic-wrap" aria-hidden="true">
          <mat-icon class="logout-graphic">logout</mat-icon>
        </div>
        <div class="logout-titles">
          <h2 id="logoutTitle" class="logout-heading">Sign out?</h2>
          <p class="logout-sub">You will need to sign in again to access your account</p>
        </div>
      </header>

      <footer class="modal-actions" role="group" aria-label="Logout actions">
        <button mat-flat-button class="btn-logout" (click)="logout()" aria-describedby="logoutTitle">Sign out</button>
        <button mat-stroked-button class="btn-cancel" (click)="dialog.closeAll()">Cancel</button>
        <!-- <button mat-flat-button color="warn" class="btn-logout" (click)="logout()" aria-describedby="logoutTitle">Sign out</button> -->
      </footer>
    </div>
  </div>
</ng-template>
