<aside class="app-side-nav" [class.collapsed]="collapsed" *ngIf="isLogin" role="navigation" aria-label="Main navigation">

    <!-- Top -->
    <div class="side-top">
        <div class="logo-wrap">
            <img *ngIf="!collapsed" class="institute-logo institute-logo-expanded" src="/assets/images/logo-main.png" alt="Institute logo" loading="lazy" />
            <img *ngIf="collapsed" class="institute-logo institute-logo-collapsed" src="/assets/images/logo.png" alt="" loading="lazy" />
        </div>
        <button class="collapse-toggle" (click)="toggleCollapse()"
            [attr.aria-expanded]="!collapsed"
            [attr.aria-label]="collapsed ? 'Expand sidebar' : 'Collapse sidebar'">
            <mat-icon class="collapse-icon">{{ collapsed ? 'chevron_right' : 'chevron_left' }}</mat-icon>
        </button>
    </div>

    <!-- Navigation -->
    <nav class="menu" role="menubar" aria-label="Main menu">
        <ng-container *ngFor="let m of menus">
            <ng-container *ngIf="['Users','Question Banks','Questions','Manage test','Schedule Test'].includes(m.label); else plainLink">
                <a *hasAccess="permissionNameForMenu(m.label); hasAccessAction: 'view'"
                    [routerLink]="m.path"
                    class="menu-item"
                    role="menuitem"
                    routerLinkActive="active"
                    [routerLinkActiveOptions]="{exact: false}"
                    (click)="onMenuClick(m)"
                    [ngClass]="{ 'active': selectedMenu === m.label }"
                    [attr.aria-current]="selectedMenu === m.label ? 'page' : null"
                    [attr.data-tooltip]="m.label">
                    <span class="menu-icon-wrap">
                        <mat-icon class="menu-icon" svgIcon="{{ m.icon }}"></mat-icon>
                    </span>
                    <span class="menu-label" *ngIf="!collapsed">{{ m.label }}</span>
                </a>
            </ng-container>
            <ng-template #plainLink>
                <a [routerLink]="m.path"
                    class="menu-item"
                    role="menuitem"
                    routerLinkActive="active"
                    [routerLinkActiveOptions]="{exact: false}"
                    (click)="onMenuClick(m)"
                    [ngClass]="{ 'active': selectedMenu === m.label }"
                    [attr.aria-current]="selectedMenu === m.label ? 'page' : null"
                    [attr.data-tooltip]="m.label">
                    <span class="menu-icon-wrap">
                        <mat-icon class="menu-icon" svgIcon="{{ m.icon || 'menu' }}"></mat-icon>
                    </span>
                    <span class="menu-label" *ngIf="!collapsed">{{ m.label }}</span>
                </a>
            </ng-template>
        </ng-container>
    </nav>

    <!-- Footer -->
    <footer class="side-bottom" *ngIf="!collapsed">
        <p class="app-version">
            <span class="version-label">v1.1.3</span>
            <span class="copyright">&copy; 2026 Profluent Labs</span>
        </p>
    </footer>

    <ng-content></ng-content>
</aside>
